version: "3.9"

networks:
  payment-net:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  prometheus-data:
  grafana-data:

services:
  # ─── Banco de dados principal ────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: payment-postgres
    restart: unless-stopped
    networks:
      - payment-net
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: payment_orchestrator
      POSTGRES_USER: payment_user
      POSTGRES_PASSWORD: payment_pass
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payment_user -d payment_orchestrator"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ─── Cache e filas ───────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: payment-redis
    restart: unless-stopped
    networks:
      - payment-net
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  # ─── Observabilidade: métricas ───────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: payment-prometheus
    restart: unless-stopped
    networks:
      - payment-net
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ─── Observabilidade: dashboards ─────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: payment-grafana
    restart: unless-stopped
    networks:
      - payment-net
    ports:
      - "3002:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_INSTALL_PLUGINS: ""
    volumes:
      - grafana-data:/var/lib/grafana
      - ./infra/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health | grep -q ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ─── Observabilidade: tracing distribuído ────────────────────────────────────
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: payment-jaeger
    restart: unless-stopped
    networks:
      - payment-net
    ports:
      - "16686:16686"   # UI
      - "4318:4318"     # OTLP HTTP (OpenTelemetry)
      - "6831:6831/udp" # Jaeger compact thrift
    environment:
      COLLECTOR_OTLP_ENABLED: "true"